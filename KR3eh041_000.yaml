body:
  text: 十藥總論夫人之生也皆稟天地之氣而成形宜乎保養真元固守根本則一病不生四體輕健若曰不養真元不守根本病即生矣根本者氣血精津也豫得先師之教萬病無如癆症之難蓋因人之壯年血氣充聚津液完足之際不能守養惟務酒色豈分飢飽日夜耽欲無有休息以致耗散精液則嘔血吐痰骨蒸煩熱腎虛精竭形羸頰紅面白口乾咽燥小便白濁遺精盜汗飲食難進氣力全無斯因火乘金位重則半年而斃輕則一載而傾況為醫者不究其源不通其治或大寒大熱之藥妄投亂進不能取效殊不知大寒則愈虛其中大熱則愈竭其內所以世之醫者無察其情豫師用藥治癆如羿之射無不中的余以用藥次第開列於後用藥之法逐一條陳如嘔血咳嗽者先服十灰散劫住如不住者須以花蕊石散止之大抵血熱則行血冷則凝見黑則止此定理也止血之後患人必疏解其體用獨參湯補之令其熟睡一覺不要驚動醒則病去六七矣次服保真湯止嗽寧肺太平丸潤肺扶痿消化丸下痰疏氣保和湯分治血盛痰盛喘盛熱盛風盛寒盛六事加味治之余無加法又服藥法曰三日前服保真湯三日後服保和湯二藥相間服之為準每日仍濃煎薄荷湯灌漱喉中用太平丸徐徐咽下次噙一丸緩緩化下至上床時候如此用之夜則肺竅開藥必流入肺竅此訣最為切要如痰壅卻先用餳糖煬消化丸百丸吞下又依前嚼太平丸令其仰臥而睡嗽必止矣如有餘嗽可煮潤肺膏服之復其根本完其真元全愈之後方合十珍丸服之此謂收功起身藥也前藥如神之妙如神之靈雖岐扁再世不過於此籲世之方脈用藥不過草木金石碌碌之常耳何以得此通神訣要奇異之靈也余蒙師授此書吳中治癆何止千萬人哉未嘗傳與一人今衛世恐此泯失重次序一新名曰十藥神書留遺子孫以廣其傳矣甲字十灰散治癆症嘔血吐血咯血嗽血先用此藥止之大薊小薊荷葉扁柏葉茅根茜草根山梔大黃牡丹皮棕櫚皮各等分上各燒灰存性研極細末用紙包碗蓋於地上一夕出火毒用時先將白藕搗汁或蘿蔔汁磨京墨半碗調服五錢食後服下如病勢輕用此立止如血出成升斗者用後藥止之十灰大小薊大黃梔子茅根茜草根側柏葉同荷葉等棕櫚皮並牡丹嘗陳修園按前散自注云燒灰存性今藥肆中止知燒灰則色變為黑而不知存性二字大有深義蓋各藥有各藥之性若燒之太過則藥成死灰無用之物矣唯燒之初燃即速放於地上以碗覆之令滅其火俾各藥一經火煉色雖變易而本來之真性俱存所以用之有效人以為放地為出火氣猶其淺焉者也然余治證四十餘年習見時醫喜用此藥效者固多而未效者亦復不少推原其故蓋因制不如法亦因輕藥不能當此重任必須深一步論治審其脈洪面赤傷於酗醉惱怒者為火載血而上行症余制有惜紅丸日夜三四服但須以麻沸湯泡服不可煮服為囑審其素能保養脈沉而細面赤淡白血來時外有寒冷之狀者為陽虛陰必走症余制有惜紅散加鮮竹茹日夜服三劑其藥之配合散見於拙刻各種中茲因集隘不能備登乙字花蕊石散五臟崩損湧噴血出成升斗者用此止之花蕊石火煅存性研為粉不拘多少上用童便一盅頓溫調末三錢甚者五錢食後服下男子用酒一半女人用醋一半與童便和藥服使瘀血化為黃水服此以後藥補之潘按一治産後敗血不盡血迷血暈胎衣不下脈急不省人事但心頭溫者急用一服灌下瘀血化水而出其人即蘇效驗如神花蕊石須火煅研燉分酒醋和童便功能化瘀為黃水輕用三錢重五錢甲乙二方論治吐血者兢推可久而葛先生首以二方為止血要著明明劫劑毫無顧忌豫由繹之始知葛先生意之所到理之精也人生陽根於陰陰氣虧則陽自勝上氣為之喘促咳吐痰沫發熱面紅無不相因而致故留得一分自家之血即減得一分上升之火易為收拾何今日之醫動以引血歸經為談不可概用止血之味甚至有血溢於外吐出亦美壅反為害遂令病者信之遷延時日陰虛陽旺煎熬不止至於不救果誰之咎倘謂引經可必不妨少俟幾日後用補陰元神可復吾恐有形之血豈能使之速生而無偶之陽何法使之速降豫所以一再思惟而悟先生急於止血之大旨也潘按金匱治虛癆症以補虛祛風逐瘀為三大綱此不易之準繩陳修園按虛癆症金匱以桂枝加龍骨牡蠣湯從腎虛以立法建中湯從脾以立法黃耆建中湯從氣血兩虛以立法八味地黃丸天雄散溫其下元從脾腎氣血之總根處以立法是以補虛為一大綱也以薯蕷丸治風氣百疾虛羸諸不足是以祛風為一大綱也以大黃蟅蟲丸治乾血成癆是以逐瘀為一大綱也三綱鼎足為此症不易之準繩今葛仙翁以花蕊石散繼於十灰散之後雖云止血實欲使瘀血化為黃水而不見血也然自余思之吐血既止而離經之血蓄而不行不可不用此散化之若血來勢如湧泉相續不絶竟用此散令其盡化為水是令一身之血俱歸烏有尚有生理乎讀書不可死於句下此其一也且三大綱因虛而成癆醫書恆有治法而因風而致者言之頗罕而因瘀血而致者除仲景金匱大黃蟅蟲丸仲景小品百癆丸外未有發明其旨且金匱以薯蕷丸與大黃蟅蟲丸並舉意以風氣不去則足以賊正氣而生長不榮乾血不去則足以留新血而滲灌不周怯症種種所由來也余治吐血諸藥不止者用金匱瀉心湯百試百效其效在生大黃之多以行瘀也附録仲景百癆丸方當歸炒乳香沒藥各一錢人參分數闕虻蟲十四個去翅足水蛭十四個炒桃仁十四粒去皮尖大黃四錢蜜丸如梧桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日百勞水者杓揚百遍即甘瀾水也蟅蟲一名地鱉潘按薯蕷丸治虛癆諸不足風氣百疾蟅蟲丸治五癆諸傷內有乾血肌膚甲錯風氣不去則足以賊正氣而生長不榮以薯蕷丸為要方乾血不去則足以留新血而灌溉不周以蟅蟲丸專治瘀血成癆之症丙字獨參湯止血後此藥補之大人參二兩去蘆上每服水二盞棗五枚煎一盞細呷之服後熟睡一覺後服諸藥除根功建三才得令名陰陽血脫可回生人參二兩五枚棗服後方知氣力宏潘按世之用參者或以些少姑試之或加他味以監製之其權不重力不專人何賴以生古人多用於大汗大下之後及吐血血崩血暈諸症惟咳嗽去之丙字人參湯論凡失血後不免精氣怯弱神思散亂前方雖有止血之功而無補益之力故有形者之陰不能即復而幾微之氣不當急固乎頓服參一兩不但脫血益氣亦且陽生陰長觀先生自注云宜熟睡一覺使神安氣和則煩除而自靜蓋人之精神由靜而生亦由靜而復也奈何今之醫者遇吐血家乃視參如毒耶陳修園按神農本草經云人參氣味甘微寒無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年經文只此三十七字其提綱云主補五臟以五臟屬陰也精神不安驚悸不止目不明心智不足皆陰虛為亢陽所擾也今五臟得甘寒之助則安之定之止之明之開之益之之效矣曰邪氣者非指外邪而言乃陰虛而壯火食氣火即邪氣也今五臟得甘寒之助則邪氣除矣細味經文無一字言及溫補回陽何後人信從宋元無稽之説而反疑開天明道之聖經耶此症用至二兩以失血之後臟陰太虛陰虛則不能維陽陽亦隨脫故用二兩任專力大可以頃刻奏功但人參雖有補虛之功而咳嗽者忌之乘此大血甫止之際咳嗽未作急急飲之若得熟睡一夜則血從心臟而生沛然莫之能御即所失成升成鬥周時補之而有餘矣若睡未足而驚醒之則血亦停而不生矣若血止一二三日而始服之不徒無益而有害周氏舊注亦超但以人參為補氣之品未免囿於俗見然人參補陰與地黃龜板之一於補陰者不同按其字義參者參也其功與天地人並立為三且能入肺肺為一身之橐籥謂為益氣卻亦近道程山齡謂貧者以歸脾湯代之然不如取當歸補血湯二劑入童便二茶碗隔湯燉二炷香取汁頓服之丁字保和湯久嗽肺痿知母貝母天門冬款冬花各三錢天花粉薏苡仁杏仁五味子各二錢甘草兜鈴紫菀百合桔梗阿膠當歸地黃紫蘇薄荷百部各一錢五分上以水二盞生薑三片煎一盞入飴糖一匙調服日三食後各進一盅與保真湯相間服血盛加炒蒲黃茜根藕節大薊小薊茅花當歸痰盛加南星半夏陳皮茯苓枳實枳殼喘盛加桑白皮陳皮蘿蔔子葶藶子蘇子熱甚加山梔子黃連黃芩黃柏連翹大黃款冬花風甚加荊芥防風菊花細辛香附子旋覆花寒甚加人參桂枝臘片芍藥知貝款天冬各三二錢杏薏味天花錢半二百阿歸地紫菀兜蘇薄桔甘潘按與太平丸藥品有十味同既有寧嗽金丹不必再服此湯薏苡仁以及桔梗貝母見千金外臺治肺痿甘草乾薑金匱治肺冷之方紫菀款冬五味百部地黃阿膠兜鈴杏仁甘草亦從外臺止嗽生津各方採來所謂復方是也肺症生薑不可輕用加減歌歸茅大小薊蒲黃藕節茜根血盛當痰盛南星陳半入茯苓枳實殼須將喘加桑白陳皮等蘿蔔葶蘇三子詳熱甚芩連梔柏款連翹合併大黃吞風加香附荊防細旋覆菊花六件良寒甚加參兼牡桂芍加蠟片不須言陳修園按此方治久嗽不過類集順氣化痰清火解鬱之品以多為貴絶無把柄抑又思之先生有道之士也其方又得之神人何以庸陋至此且蘇葉桔梗薄荷辛散非久嗽所宜百部款冬苦溫非血後所宜兜鈴花粉杏仁亦為中虛所忌知母貝母天門冬地黃阿膠百合性寒而滯力亦輕微其去市肆中之問症立方搖鈴輩之籠統配合以零賣者幾希耶然此方屢見於大家之書如明季龔太醫各刻及萬病回春壽世葆元等本亦載之但方名間有不同藥品偶有增減村醫用之往往見效余向以病人壽算未終總不歸功於此方亦隨見而隨忘之耳今得此書始知禮失而求諸野霑體塗足中大有人焉轉悔從前之肉眼也究於此方未得其旨大抵奇之弗去而偶之一方不去而復之如韓信將兵多多益善且其輕重大有法度加生薑之辛溫以潤肺飴糖之甘培土以生金卓然大家可知仙方非凡人所能窺測也但喘盛加蘿蔔子與地黃相反臨時自當去取戊字保真湯治虛弱骨蒸體虛當歸生地黃白朮黃耆人參各三錢赤茯苓陳皮赤芍藥白茯苓甘草厚朴各一錢五分天冬麥冬白芍藥知母黃柏五味子地骨皮熟地黃柴胡各一錢每服水二盞薑三片棗五枚煎與保和湯間服每日一服驚悸加茯神遠志柏子仁酸棗仁淋濁加萆薢烏藥豬苓澤瀉便澀加石葦萹蓄木通赤苓遺精加龍骨牡蠣蓮心蓮鬚燥熱加石膏滑石鱉甲青蒿盜汗加浮小麥牡蠣黃耆麻黃根參耆歸地術三錢赤白茯苓朴草兼赤芍陳皮錢半等味柴白芍二冬編骨皮熟地和知柏各一錢加薑棗煎加減歌骨蒸又見悸和驚棗遠茯神柏子仁淋濁萆烏豬澤入遺精龍牡蓮鬚心小便澀要加石葦萹蓄木通共赤苓燥熱青蒿石滑鱉麻根盜汗蠣浮耆丁戊二湯方論一名保和者因失血之後氣血未調率難把握然調血者以氣為主調氣者實肺為司故大旨以瀉肺中之伏熱益下焦之化源此其治也若和而失其所以為和則保亦失其所以為保矣至保真則氣血之味俱等大旨以甘溫為主甘涼佐之而苦寒又佐之未常禁用苦寒也而與今日之用寒涼者異矣曰保真者大輔其正兼瀉其邪使生機活潑油油然而不已也兩方如法大備然非盡用亦姑列之以伺去取耳學者須知陳修園按此方即十全大補湯去川芎肉桂加赤苓赤芍生地天冬麥冬五味子柴胡厚朴陳皮地骨皮知母黃柏是也氣血雙補之中加柴胡地骨以疏肝邪肝火即雷火也知母黃柏以降腎火腎火即龍火也又合麥冬五味子為生脈散俾水天一氣又合天門冬為三才湯以位育一身最妙是陳皮厚朴甘草入胃寬中行滯導諸藥各盡其運動之力而協和共濟且藥品輕重得宜大有法度但芍藥以花之赤白別之其根則不可辨也藥肆中另有一草葉小根大與芍藥無異余家山中親見採藥人握取盈囊問之則曰藥鋪所備赤芍皆此種也始信本草崇原注云赤芍不知何草之根今外科小兒科習用害人之説非虛語也方中當去之己字太平丸治久嗽肺痿肺癰天門冬麥門冬知母貝母款冬花各二兩杏仁當歸熟地生地阿膠珠黃連各一兩五錢蒲黃京墨桔梗薄荷各一兩白蜜四兩麝香少許上為細末和勻用銀石器先下白蜜煉熟後下諸藥末攪勻再上火入麝香略熬三二沸丸如彈子大每日三食後細嚼一丸薄荷煎湯緩緩化下臨臥時如痰盛先用飴糖拌消化丸吞下卻噙嚼此丸仰臥使藥流入肺竅則肺清潤其嗽退除服七日病痊凡咳嗽只服此藥立愈二兩三冬二母如歸連二地杏阿珠各需兩五餘皆兩京墨蒲黃薄桔俱潘按與保和湯藥品有十味同茲加金箔用蠟丸名為寧嗽金丹甚效鎮定魂魄寧安驚悸連服五七丸即愈心岸配送吳蓮叔見之佩甚稱讚不已己字太平丸論太平丸非正方也先生意計周密恐人氣血漸復之後尚留一分未盡必有一分未妥特豫宴息之時噙服此丸使人於靜中不知其所以然而藥力無不到此少許麝香之所以為神妙也陳修園按方中潤燥化痰養液少佐薄荷以利氣無甚深義唯雜以黃連之苦寒麝香之走竄不幾令人駭而吐舌乎而不知令人駭處正是神仙妙用處神農本草經云黃連氣味苦寒苦為火之本味以其味之苦而補之而寒能勝火即以其氣之寒而瀉之一物而兼補心瀉心之妙故凡久嗽肺痿肺癰得此則火不剋金而金自受益矣本草經又云麝香主辟惡氣去三蟲蓋勞嗽不已則為瘵病而生蟲非泛常之藥所可治唯麝為諸香之冠香者天地之正氣也正能辟邪而殺蟲瘵病之有蟲如樹之有蠹唯先去其蠹而後培其根則發榮滋長矣況咳嗽不離於肺肺有二竅一在鼻一在喉肺竅宜開不宜閉喉竅宜閉不宜開今鼻竅不通則喉竅將啓而為患必得麝香之香氣最盛直通於鼻竅而開之則呼吸順而咳嗽之病除根矣舊注未闡出所以然之妙今特補之庚字沉香消化丸治熱嗽壅盛青礞石明礬飛研細豬牙皂角生南星生半夏白茯苓陳皮各二兩枳殼枳實各一兩五錢黃芩薄荷葉各一兩沉香五錢上為細末和勻薑汁浸神麯為丸梧桐子大每服一百丸每夜臨臥餳糖拌吞噙嚼太平丸二藥相攻痰嗽除根南星皂半茯苓陳礞石明礬二兩均枳實殼皆需兩五薄芩一兩五錢沉庚字消化丸論人見此數味或畏其狠即豫亦嫌其峻然先生注云痰熱壅盛乃以上治其不至壅盛者稍稍減服四五十丸可也況前先服獨參繼用保真則神氣亦漸復矣暫用幾服胡為不可若情形消瘦者未可用也是又在學者臨證自明耳陳修園按此方即滾痰丸去大黃加明礬皂角南星半夏茯苓陳皮枳殼枳實薄荷葉是也方面略同而功用則有南轅北轍之判彼以大黃領各種化痰之藥從大腸一滾而下而不知不得痰之所在徒下其糞則反傷胃氣也蓋痰者水也水者氣也水性下行得火則上沸而為痰方中所以取用黃芩以清火水非氣不行氣滯則水亦滯遂停瘀不行而為痰方中所以取用沉香陳皮枳殼枳實等藥重重疊疊以順氣化氣行氣且水汜濫則患大由於地中行則天下安方中取半夏南星之辛溫茯苓之淡滲以燥治濕即以土製水之義語云見痰休治痰是也方中唯礞石化痰為水質重而力大薄荷利氣化痰體輕而行速二味為治標之藥亦輕重各得其宜最妙是明礬皂角二味凡水渾濁入明礬攪之則濁者立刻轉清矣衣服汙穢以皂角洗之則汙者隨滌而淨矣古人制方之周到如此所疑者虛勞之症不能當此峻劑然病重藥輕多致誤人喻嘉言譏為養殺不如籌一生路而為破釜沉舟之計尚有餘望每見痰嗽不絶肌骨消瘦聲啞骨蒸五更更熱而汗出早飯後皮膚雖熱而脊背畏寒手指微冷此癆損既成十不救一之症醫者議論互異而一種迂儒謂肺虛液少但云保肺尤其淺也必以六君子湯歸脾湯補中益氣湯之類常服土旺自可生金毋區區於保肺因前病金受火克但知清心治其末也必以六味地黃湯瓊玉膏三才湯都氣丸八仙長壽丸之類常服脾水足自能濟火毋汲汲以清心也此為東垣立齋之法人人信服而不疑且有更進一步自誇為得張景嶽之心法謂真水為元陰真火為元陽皆根於命門元陰之水中生艮土而上潤肺金元陽之火中生坤土而上通心火陰陽互根而不相離六味湯丸左歸飲丸八味湯丸右歸飲丸皆為極品自此説一行而虛勞之證十患九死曷不思脾為諸臟之母當無病時常服補藥尚難進其飲食長其肌肉至虛損病篤之時將何法補其不足且能令其有餘以生金耶腎為壽命之根當無病時常服補藥尚難充其精氣強其腰膝至虛損病篤之時又何法補其不足且能令其有餘以濟火耶鄉願為德之賊吾謂庸醫之陰毒更甚妄醫之陽毒也近日更有襲取葉天士一派遇有感冒即用前胡乾葛杏仁桑葉桔梗紫蘇防風茯苓橘紅蘇法夏神麯穀芽麥芽山楂炭甘草為主方頭痛加川芎白芷身痛加羌活秦艽咳嗽加紫菀百部口渴加麥冬花粉小便短少加滑石木通澤瀉豬苓腹脹加厚朴枳實蘿蔔子砂仁殼皮膚作癢加蟬退白蒺藜連翹喉痛加元參射干牛蒡子貝母寒熱往來加柴胡酒芩腰膝痛加牛膝杜仲腳腫加木瓜防己病從怫鬱則加黑鬱金香附發熱不退加白薇地骨青蒿白芍數日未愈曰當略調其氣血加當歸酒芍何首烏乾地黃丹參沙參等出入互用至於久病虛人則以遼東海參燕窩鮑魚穀芽首烏炙草等為主其參朮耆苓二地桂附吳萸炮薑等隨症加入而金銀花炭枸杞炭菊花炭白朮炭地黃炭鮮桑枝金銀花藤泡淡乾薑渣泡淡附子泡淡吳茱萸秫稻根鬚鱉血柴胡五色石藝冬瓜子整個生扁豆黑穭豆皮緑豆皮西瓜翠皮之類曰我是葉天士一派與恆法不同而不知葉天士居江蘇該處人腠理較薄外邪易入而亦易出不用仲景正法故於傷寒論一部未得師授議論甚覺隔靴其於雜症胸中頗有書卷加以絶世聰明臨症甚多所以名噪一時而虛勞一症專祖十藥神書不必全用其方神而明之信手拈來頭頭是道何若輩僅於臨症指南中食其糟粕而偽託之也耶辛字潤肺膏久嗽肺燥肺痿羊肺一具杏仁淨研柿霜真酥真粉各一兩白蜜二兩上先將羊肺洗淨次將五味入水攪黏灌入肺中白水煮熟如常服食前七藥相間服之亦佳真粉真酥並柿霜杏仁淨研兩平當蜜加二兩調黏用灌入肺中水煮嘗辛字潤肺膏論血去則燥燥則火旺肺必枯欲從腎源滋水而不先滋水之母有是理乎然肺為多氣少血之臟故一切血藥概不欲用以羊肺為主諸味之潤者佐之人所易能也若以真粉之甘寒不獨涼金且以培土人所未知也潤肺之中意則甚美故曰醫者意也陳修園按方中真粉即傷寒論豬膚湯之白粉也本文未明為何粉一説即天花粉主滋潤肺金取金水相生之義一説即粳米粉以少陰之水火交會於陽明中土粳米補陽明中土交水火而止煩燥而且藉土氣以生金二説俱有深義余每用則從後説今讀先生此方又閲周氏所注真白粉即天花粉無疑嘉慶丁巳歲余應興泉觀察阿公泉州郡伯張公聘主清源書院講席日者用天花粉一味藥鋪送白粉一包其色晶瑩潔白迥出諸藥之上余傳問之答曰此物最賤而製造卻難惟冬月葉落其氣盡歸於根掘取以法取汁和水淘洗澄之曬乾收貯才有如此寶色若無此色恐偽物弗效不如止用天花粉片之較妥也今先生加一真字何等鄭重其辭推而論之金匱於蟲病制有甘草粉蜜湯以殺蟲若虛癆久嗽為瘵蟲蝕蟲鉛粉性毒能殺三蟲今雜於蜂蜜柿霜羊肺之中誘蟲食之旋而甘味盡毒性發而蟲患除矣此非正解亦可備之以啓悟機壬字白鳳膏一切久怯極虛憊咳嗽吐痰咯血發熱黑嘴白鴨一隻大京棗二升參苓平胃散一升陳煮酒一瓶上將鴨縛定腳量患人飲酒多少隨量以酒燙溫將鴨項割開滴血入酒攪勻飲之直入肺經潤補其肺卻將鴨干撏去毛於脅邊開一孔取去腸雜拭乾次將棗子去核每個中實納參苓平胃散末填滿鴨肚中用麻扎定以砂瓶一個置鴨在內四圍用火慢煨將陳酒煮作三次添入煮乾為度然後食棗子陰乾隨意用參湯化下後服補髓丹則補髓生津和血順氣參苓平胃散一升京棗二升酒一瓶黑嘴白毛肥鴨一照方如法制來斟陳修園按怯而日久虛極而憊而且咳嗽不已則肺日因嗽而動擾矣吐痰不已則肺因痰而壅滯矣咯血發熱壯火食氣不特肌肉消瘦而且氣衰言微矣此為極症恐非無情之草木所能治故用黑嘴白鴨一隻為君蓋以毛白者味較清而入肺嘴黑者骨亦黑而入腎取金水相生之義亦資異類有情之物以補之也最妙入京棗二升取其甘溫以補胃平胃散一升取其消導以轉胃胃為五臟六腑之本胃安則臟腑俱安與保真湯佐以厚朴同義葉天士於此書亦參透其旨但其方隨症加入以致學徒刊刻匯案用厚朴者於虛癆門止收一方意者中人以下不可以語上重其道而不輕傳歟修園則異於是癸字補髓丹久癆虛憊髓干精竭血枯氣少服煎藥愈後服此藥豬脊膂一條羊脊膂一條團魚一枚烏雞一隻四味制淨去骨存肉用酒一大碗於沙甕內煮熟擂細再用後藥大山藥五條蓮肉半斤京棗一百枚霜柿十個四味修制淨用井花水一大瓶於沙甕內煮熟擂細於前熟肉一處用慢火熬之卻下明膠四兩黃蠟三兩上二味逐漸下與前八味和一處研成膏子和平胃散末四君子湯末並知母黃柏末各一兩共一十兩搜和成劑如十分堅硬入白蜜同熬取起放青石上用水捶打如泥丸如梧桐子大每服一百丸不拘時候棗湯下豬羊脊膂雞團魚煮擂宜當去骨需霜柿十枚京棗百建蓮八兩五條薯熟和前味熬文火黃蠟明膠漸入諸知柏四君平胃末各和一兩制丸茹陳修園按久癆虛憊髓干精竭等症服煎藥愈後服此藥二十字是為虛癆既愈症籌一善後之計實為虛癆窮極症覓一回春之路也虛癆至六極之候凡和解溫涼補瀉之藥無不歷試初服間或少效久之無不增劇名醫俱束手無策然藥以治病食以養人二語參透大有妙議蓋得病日久日在藥中禾黍之腸改充雜草腸胃之所惡者藥也若更以藥投之是重困之而不能堪矣先生用山藥蓮肉京棗霜柿取日食之果菜以悅脾胃之性情用豬髓羊髓團魚烏雞牛膠日用之肉食以充脾胃之虛餒即扁鵲所謂損其脾者調其飲食內經所謂精不足者補之以味是也惟方中黃蠟一味俗醫見之無不驚駭本草備要謂服此物著於腸胃令人瀉利不止而不知此物性澀豈能作瀉威喜丸用此熔化為丸王晉三注云黃蠟性味緩澀有續絶補髓之功專調斫喪之陽分理潰亂之精故為元陽虛憊遺濁帶下之神品俗傳本草之害人往往如此況此丹盡屬骨肉有情之品溫養吾身之氣血與無情之草木懸殊葉天士用人乳粉秋石霜血餘灰之類引人身之膏脂以為繼續之計亦由此方中悟出若紫河車汙穢有毒服之無不發熱減食豈非惑於以人補人之説忍心害理適以自凊也耶又按明膠是取嫩肥黃牛皮以河水製造為之或用牛肉煎法去滓再熬成膏每斤入薑製半夏末二兩名為霞天膏治癆傷久嗽乾隆丁未余肄業鰲峰書院孟瓶庵師言其督學四川時患嗽數月同寅制饋因素不食牛拜受而不敢嘗署中閲卷張友患痰症二十餘載喜而嘗之膠痰成塊吐出甚多半月全愈身體立見壯健附志之以廣其傳王節齋云人若色欲過度傷損精血必生陰虛火動之病睡中盜汗午夜發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎泄血咯吐出血或咳血吐血衄血身熱脈沉數肌肉消瘦此名癆瘵最重難治輕者用藥數十服重者期以歲年然必須病人惜命堅心定志絶房室息妄想戒惱怒節飲食以自培其根此謂內外交治可獲全功潘按古人所謂虛勞皆是純虛無陽之症與近日之陰虛火旺者吐血咳嗽正自相反誤用必斃近日吐血咳嗽之病有似虛勞其實非虛勞也當奉此書細推其理次第施治不致害人為幸甚周氏總注豫讀此十方俱出人意表其間次第緩急可為千百世法即不必十方並用要無能出其範圍者矣一方之中自得肯綮即不必全用其藥亦可細推其理矣乃今日之治血症者輒用六味地黃增減冀其收功皆由醫貫入手而未嘗從神書體會者也彼之腎水衰足少陰則火炎為患壯水之主可鎮陽光孰知人之患此病者陰虛腎固多而他因者亦復不少假如從勞役飢飽而得者其傷在足太陰脾矣從憂患而得者其傷在手少陰心矣從嗜飲而得者其傷在手太陰肺矣從憤怒而得者其傷又在足厥陰肝矣此足致吐血咳血咯血等症豈一壯水可以勝其任乎總之人身之血附氣而行者也一臟傷則氣必不調而血遂溢於外故逆則上出墜則下行滯則阻痛寒則凝熱則散此自然之勢也後之君子於診視之際聞問之餘斟酌而得其情否乎果能於此著眼視其病之所傷在何臟脈之所傷在何部時之所值在何季思過半矣曾治一咯血之人平日極勞每咯紫黑色俱成小塊者然必是飽食則多少食則少不食或少或無余以韭汁童便製大黃治之二服可安後以補中益氣湯加血藥而愈知者以為怪妄豫謂極平常蓋實從神書究心而置醫貫為談料者也平胃散方附厚朴薑製炒陳皮去白各五兩蒼朮去皮米泔浸炒八兩炙甘草三兩本方加人參茯苓各二兩即名參苓平胃散四君子湯附人參白朮茯苓各二兩炙甘草一兩跋吾吳天士葉先生凡治吐血症皆祖葛可久十藥神書更參以人之性情病之淺深隨宜應變無過不及治無不愈然亦治之於初病之時與夫病之未經深入者若至五臟遍傳雖盧扁亦莫可如何矣家藏此書有年幾獲脈望故亟付梓然書中僅列十方世皆以方少忽之不知十方中錯綜變化有幾千百方故復採周氏之説使人粗曉業是者更察虛損二字分自上而下自下而上自不致概以六味開手矣古吳瘦樵程永培識此葉天士家藏祕書也前此流傳皆為贋本余歸田後始得原書重為訂注附於傷寒論金匱要略之後蓋以傷寒論金匱要略為萬古不易之準繩而此書則奇以取勝也然奇而不離於正故可取焉閩長樂陳念祖識姑蘇葛可久先生精通方術與丹溪朱彥修齊名所著十藥神書專治虛損雖編中僅列十方而用藥之次第逐一條陳吳航陳修園謂其奇而不離於正誠哉是言也顧前此流傳皆為贋本修園解組後始得原書重加注解將刊附於傷寒論金匱要略之後而未果乙卯歲萱從舊書坊中得一鈔本於今三年矣遍詢方家俱無是書不敢私自祕藏因並作湯方俚歌亟謀付梓以廣其傳庶不負先生壽世壽人之意云爾咸豐歲次疆圉大荒落季冬後學林壽萱謹跋
