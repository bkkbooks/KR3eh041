front:
  text: 原序余自髫稚學業醫道考究方脈三十餘年遍歷江湖多學廣博者不過言語文字形容之耳及至用藥治病皆不能捷是以日夜苦心用志務在中病後遇至人同處三月斯人極明醫道精通方術用藥如發矢無不中的余曰必神人也遂拜為師得授奇方一册閲之或群隊者或三四味者皆余目觀至人用效者也使豫如久旱逢霖夜行得月心中豁然自此回至吳中一用一捷無不刻驗信乎奇方可鋟梓者也余以三餘暇日將至人所授奇方並日用決效之法類成一帙名曰十藥神書蓋用效者輒記録之今西浙大癡道人與余通家之好用禮求授故録以奉養生濟人之功用爾時至正戊子春正月三陽日可久書於姑蘇春先堂潘序余奉使渡臺後感受海外瘴癘吐血咳嗽公餘翻閲是編照方試服不旬日血止而嗽亦平矣深服是編十方治法為切中窾要蓋吐血原於肺胃上逆十灰散用柏葉以斂肺大黃以降胃牡丹皮山梔等味以瀉肝膽之火然後清金補土固其營衛以次奏功焉得不愈經陳修園先生逐方詳注極為精當余又以己意及名人所論隨筆添注於上汪子用大令索閲是編讀而好之用之有效因為付梓剞劂既竣並乞辨言光緒己卯秋吳潘霨書於鄂署之精白堂周序豫讀此十方俱出人意表其間次序緩急可為千百世法即不必十方並用要無能出其範圍者矣一方之中自得肯綮即不必全用其藥亦可以細推其理矣乃今日之治血症者輒用六味地黃增減冀其收功皆由醫貫入手而未嘗從神書體會者也彼謂腎水衰則火炎為患壯水之主可鎮陽光也孰知人之犯此病者陰虛固多而他因得亦復不少假如從勞力而得者其傷在足太陰矣從憂思而得者其傷在手少陰矣從嗜飲而得者其傷在手太陰矣從憤怒而得者傷又在足厥陰矣皆致吐血咳血咯血等症豈一壯水可以勝其任乎總之人身之血附氣而行者也一臟傷則氣必不調而血遂溢於外故逆則上出墜則下行滯則阻痛寒則凝熱則散此自然之勢也後之君子於診視之際聞問之餘斟酌而得其情否乎果能於此著眼視其病之所傷在何臟脈之所傷在何部時之所值在何季思過半矣余曾治一咯血之人平日極勞每咯紫黑色俱成小塊者然必是飽食則多少食則少不食則或少或無豫以韭汁童便製大黃治之二服而安後以補中益氣加血藥愈而知者以為怪妄豫謂極平常蓋實從神書究心而置醫貫為談料者也康熙二十六年五月吳門周揚俊識於星沙寓中
